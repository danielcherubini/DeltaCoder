# Qwen3.5-DeltaCoder-9B v1.2 — LoRA SFT config for Axolotl
# Target: Vast.ai H200 140GB
#
# Prerequisites on the training box:
#   pip install axolotl peft transformers accelerate datasets
#   pip install flash-linear-attention==0.4.1
#   pip uninstall causal-conv1d  # conflicts with flash-linear-attention
#
# Pre-tokenize first:
#   python scripts/pretokenize.py data/v1.2_sft_train.jsonl /dev/shm/train_tokenized.jsonl
#
# Run:
#   accelerate launch -m axolotl.cli.train configs/deltacoder-9b-lora-v1.2.yaml
#
# Test run:
#   accelerate launch -m axolotl.cli.train configs/deltacoder-9b-lora-v1.2.yaml \
#     --max_steps=50 --val_set_size=0.1

base_model: Qwen/Qwen3.5-9B
trust_remote_code: true
strict: false

# ---------- Dataset ----------
# Pre-tokenized: input_ids/attention_mask/labels already computed by pretokenize.py
datasets:
  - path: /dev/shm/train_tokenized.jsonl
    ds_type: json
    type:

val_set_size: 0.02
dataset_prepared_path: last_run_prepared
output_dir: ./outputs/deltacoder-9b-v1.2

# ---------- Sequence / Packing ----------
sequence_len: 8192
sample_packing: true
pad_to_sequence_len: true

# ---------- LoRA ----------
adapter: lora
lora_r: 64
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules:
  # Full Attention (8 of 32 layers)
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  # GDN / Gated Delta Net (24 of 32 layers)
  - in_proj_qkv
  - in_proj_z
  - in_proj_b
  - in_proj_a
  - out_proj
  # MLP (all 32 layers)
  - gate_proj
  - up_proj
  - down_proj

# CRITICAL: disable LoRA kernel optimizations for Qwen3.5
lora_mlp_kernel: false
lora_qkv_kernel: false
lora_o_kernel: false

# ---------- Training ----------
num_epochs: 1
micro_batch_size: 1
gradient_accumulation_steps: 4
optimizer: adamw_torch
lr_scheduler: cosine
learning_rate: 1e-4
warmup_ratio: 0.05
weight_decay: 0.01

# ---------- Precision / Memory ----------
bf16: auto
tf32: true
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false

# SDPA — flash_attention_2 causes CUDA errors with Qwen3.5 GDN layers
attn_implementation: sdpa

# ---------- Optimization ----------
# GDN doesn't support batch>1 with packing — group_by_length reduces padding waste
group_by_length: true

# ---------- Logging / Saving ----------
logging_steps: 10
evals_per_epoch: 4
saves_per_epoch: 2
save_total_limit: 3

# ---------- DO NOT USE ----------
# fix_untrained_tokens: true   # broken with Qwen3.5 (axolotl #2660)
# flash_attention: true        # use attn_implementation: sdpa instead
