# Qwen3.5-DeltaCoder-9B v1.3 — LoRA SFT config for Axolotl
# Target: Vast.ai H200 141GB
#
# KEY CHANGE vs v1.2: sequence_len 8192 → 32768
# Rationale: OCR dataset (65K rows) averages 8,477 tokens, 50% exceed 8192.
# NVIDIA trained OpenCodeReasoning at 32K context. Training at 8192 truncated
# half the reasoning traces. H200 has 141GB VRAM (only 45GB used at 8192),
# so 32768 is comfortably within budget.
#
# Prerequisites on the training box:
#   (same as v1.2 — Axolotl template already has all deps)
#
# Pre-tokenize first:
#   python v1.3/pretokenize.py data/v1.2_sft_train.jsonl /dev/shm/train_tokenized_v1.3.jsonl 1
#
# Dry run FIRST to verify memory at 32768:
#   accelerate launch -m axolotl.cli.train v1.3/axolotl.yaml --max_steps=20
#
# Full run:
#   nohup accelerate launch -m axolotl.cli.train v1.3/axolotl.yaml \
#     > logs/v1.3_axolotl_train.log 2>&1 &

base_model: Qwen/Qwen3.5-9B
trust_remote_code: true
strict: false

# ---------- Dataset ----------
datasets:
  - path: /dev/shm/train_tokenized_v1.3.jsonl
    ds_type: json
    type:

val_set_size: 0.02
dataset_prepared_path: last_run_prepared_v1.3
output_dir: ./outputs/deltacoder-9b-v1.3

# ---------- Sequence / Packing ----------
# 32768 captures full OCR reasoning traces (avg 8,477 tokens, max ~30K)
# NVIDIA trained OpenCodeReasoning at 32K — this matches their intent
sequence_len: 32768
sample_packing: true
pad_to_sequence_len: true

# ---------- LoRA ----------
adapter: lora
lora_r: 64
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules:
  # Full Attention (8 of 32 layers)
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  # GDN / Gated Delta Net (24 of 32 layers)
  - in_proj_qkv
  - in_proj_z
  - in_proj_b
  - in_proj_a
  - out_proj
  # MLP (all 32 layers)
  - gate_proj
  - up_proj
  - down_proj

# CRITICAL: disable LoRA kernel optimizations for Qwen3.5
lora_mlp_kernel: false
lora_qkv_kernel: false
lora_o_kernel: false

# ---------- Training ----------
num_epochs: 1
micro_batch_size: 1
gradient_accumulation_steps: 4
optimizer: adamw_torch
lr_scheduler: cosine
learning_rate: 1e-4
warmup_ratio: 0.05
weight_decay: 0.01

# ---------- Precision / Memory ----------
bf16: auto
tf32: true
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false

# SDPA — flash_attention_2 causes CUDA errors with Qwen3.5 GDN layers
attn_implementation: sdpa

# ---------- Optimization ----------
# GDN doesn't support batch>1 with packing — group_by_length reduces padding waste
group_by_length: true

# ---------- Logging / Saving ----------
logging_steps: 10
evals_per_epoch: 4
saves_per_epoch: 2
save_total_limit: 3

# ---------- DO NOT USE ----------
# fix_untrained_tokens: true   # broken with Qwen3.5 (axolotl #2660)
# flash_attention: true        # use attn_implementation: sdpa instead
