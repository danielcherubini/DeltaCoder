# DeltaCoder-9B — LoRA SFT config for Axolotl
# Target: Vast.ai A100 80GB
#
# Prerequisites on the training box:
#   pip install axolotl peft transformers accelerate datasets
#   pip install flash-linear-attention==0.4.1
#   pip uninstall causal-conv1d  # conflicts with flash-linear-attention
#
# Run:
#   accelerate launch -m axolotl.cli.train configs/deltacoder-9b-lora.yaml
#
# Test run (10 min, verify loss decreases):
#   accelerate launch -m axolotl.cli.train configs/deltacoder-9b-lora.yaml \
#     --max_steps=50 --val_set_size=0.1

base_model: Jackrong/Qwen3.5-9B-Claude-4.6-Opus-Reasoning-Distilled-v2
trust_remote_code: true
strict: false

# Qwen3.5 has a dedicated chat template in Axolotl with tool_calls support
chat_template: qwen3_5

# ---------- Dataset ----------
datasets:
  - path: data/train.jsonl
    ds_type: json
    type: chat_template
    field_messages: messages
    field_tools: tools
    roles_to_train: ["assistant"]
    train_on_eos: turn

val_set_size: 0.02
dataset_prepared_path: last_run_prepared
output_dir: ./outputs/deltacoder-9b

# ---------- Sequence / Packing ----------
# CoderForge trajectories can be very long (median 38K tokens)
# but we cap at 8192 for VRAM — still captures most tool-call patterns
sequence_len: 8192
sample_packing: true
pad_to_sequence_len: true

# ---------- LoRA ----------
adapter: lora
lora_r: 64
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules:
  # Full Attention (8 of 32 layers)
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  # GDN / Gated Delta Net (24 of 32 layers)
  - in_proj_qkv
  - in_proj_z
  - in_proj_b
  - in_proj_a
  - out_proj
  # MLP (all 32 layers)
  - gate_proj
  - up_proj
  - down_proj

# CRITICAL: disable LoRA kernel optimizations for Qwen3.5
# Without this, QKV assertion errors occur
lora_mlp_kernel: false
lora_qkv_kernel: false
lora_o_kernel: false

# ---------- Training ----------
num_epochs: 2
micro_batch_size: 1
gradient_accumulation_steps: 8
optimizer: adamw_torch
lr_scheduler: cosine
learning_rate: 2e-4
warmup_ratio: 0.05
weight_decay: 0.01

# ---------- Precision / Memory ----------
bf16: auto
tf32: true
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false

# Use SDPA, NOT flash_attention_2 — flash_attn + sample_packing = loss goes to 0
attn_implementation: sdpa

# ---------- Logging / Saving ----------
logging_steps: 10
evals_per_epoch: 4
saves_per_epoch: 2
save_total_limit: 3

# Uncomment if you have a wandb account
# wandb_project: deltacoder-9b
# wandb_entity:
# wandb_name: deltacoder-9b-lora-r64

# ---------- DO NOT USE ----------
# fix_untrained_tokens: true   # broken with Qwen3.5 (axolotl #2660)
# flash_attention: true        # use attn_implementation: sdpa instead
